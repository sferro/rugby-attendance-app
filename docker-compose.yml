services:
  web:
    build: .
    container_name: rugby_attendance_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: rugby_attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: rugby_attendance_db
      POSTGRES_USER: rugby_user
      POSTGRES_PASSWORD: rugby_password
    ports:
      - "5432:5432"

volumes:
  postgres_data:
